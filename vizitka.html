<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Екатерина Махотенко — AI Эксперт</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0a0a0a;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  overflow:hidden;
}

canvas{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
}
#net{z-index:1}

.wrap{
  position:relative;
  z-index:10;
  padding:20px;
  width:100%;
  max-width:460px;
}

.card{
  background:rgba(255,255,255,0.035);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(180,150,255,0.18);
  border-radius:28px;
  padding:40px 32px 36px;
  text-align:center;
  position:relative;
  overflow:hidden;
  box-shadow:
    0 0 60px rgba(140,100,255,0.12),
    0 0 120px rgba(140,100,255,0.05),
    inset 0 1px 0 rgba(255,255,255,0.08);
}

/* scan line */
.card::after{
  content:'';
  position:absolute;
  top:-100%;left:0;right:0;
  height:35%;
  background:linear-gradient(transparent,rgba(167,139,250,0.03),transparent);
  animation:scan 5s linear infinite;
  pointer-events:none;
}
@keyframes scan{0%{top:-100%}100%{top:200%}}

/* glow blobs */
.b{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none}
.b1{width:220px;height:220px;background:rgba(180,100,255,0.13);top:-70px;right:-50px;animation:bf 7s ease-in-out infinite}
.b2{width:160px;height:160px;background:rgba(80,190,255,0.09);bottom:-50px;left:-40px;animation:bf 9s ease-in-out infinite reverse}
.b3{width:110px;height:110px;background:rgba(255,140,200,0.09);bottom:90px;right:10px;animation:bf 5.5s ease-in-out 2s infinite}
@keyframes bf{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-22px) scale(1.08)}}

/* corner sparkles */
.sp{position:absolute;opacity:0.45}
.sp.tl{top:14px;left:14px}
.sp.tr{top:14px;right:14px}
.sp.bl{bottom:14px;left:14px}

/* neural visual */
.vis{width:116px;height:116px;margin:0 auto 26px;position:relative}
.vis svg{width:100%;height:100%}

/* name */
h1{
  font-size:clamp(24px,7vw,36px);
  font-weight:800;
  background:linear-gradient(135deg,#d8b4fe,#a78bfa,#818cf8,#c4b5fd,#f0abfc);
  background-size:300% 300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:gs 4s ease infinite;
  filter:drop-shadow(0 0 18px rgba(167,139,250,0.55));
  margin-bottom:10px;
  letter-spacing:-0.3px;
}
@keyframes gs{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* subtitle */
.sub{
  font-size:11px;
  color:rgba(196,177,255,0.65);
  letter-spacing:2.5px;
  text-transform:uppercase;
  margin-bottom:26px;
  font-weight:500;
}

.line{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(167,139,250,0.38),transparent);
  margin:0 auto 26px;
  width:75%;
}

/* widgets */
.widgets{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:26px;
}
.wg{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(167,139,250,0.13);
  border-radius:16px;
  padding:13px 10px 11px;
  position:relative;
  overflow:hidden;
  transition:transform .3s ease,border-color .3s ease,box-shadow .3s ease;
  cursor:default;
}
.wg:hover{
  transform:translateY(-3px);
  border-color:rgba(167,139,250,0.38);
  box-shadow:0 6px 22px rgba(167,139,250,0.15);
}
.wg::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(167,139,250,0.45),transparent);
}
.wg-lbl{
  display:block;
  font-size:9px;
  color:rgba(167,139,250,0.55);
  text-transform:uppercase;
  letter-spacing:1.2px;
  margin:5px 0 3px;
}
.wg-val{
  display:block;
  font-size:15px;
  font-weight:700;
  color:rgba(220,200,255,0.88);
}

/* social */
.socials{
  display:flex;
  justify-content:center;
  gap:14px;
  margin-bottom:22px;
}
.soc{
  display:flex;
  align-items:center;
  justify-content:center;
  width:50px;height:50px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(167,139,250,0.18);
  border-radius:14px;
  color:rgba(200,180,255,0.8);
  text-decoration:none;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  overflow:hidden;
}
.soc::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(167,139,250,0.22),rgba(80,190,255,0.1));
  opacity:0;
  transition:opacity .3s ease;
}
.soc:hover{
  transform:translateY(-5px) scale(1.12);
  border-color:rgba(167,139,250,0.6);
  box-shadow:0 10px 28px rgba(167,139,250,0.28);
}
.soc:hover::before{opacity:1}
.soc svg{position:relative;z-index:1;transition:transform .3s ease}
.soc:hover svg{transform:scale(1.15)}

/* cta */
.cta-wrap{position:relative}
.cta-wrap::before,.cta-wrap::after{
  content:'';
  position:absolute;inset:-3px;
  border-radius:19px;
  border:1px solid rgba(139,92,246,0.38);
  animation:pr 2.2s ease-out infinite;
}
.cta-wrap::after{animation-delay:1.1s}
@keyframes pr{0%{transform:scale(1);opacity:.55}100%{transform:scale(1.05);opacity:0}}

.cta{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:9px;
  width:100%;
  padding:15px 28px;
  background:linear-gradient(135deg,#8b5cf6,#7c3aed,#6d28d9);
  border:none;
  border-radius:16px;
  color:#fff;
  font-size:15px;
  font-weight:600;
  text-decoration:none;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:all .3s ease;
  letter-spacing:.4px;
  box-shadow:0 4px 22px rgba(139,92,246,0.42);
}
.cta::before{
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.14),transparent);
  transition:left .55s ease;
}
.cta:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(139,92,246,0.58)}
.cta:hover::before{left:100%}
.cta:active{transform:translateY(0)}
.cta span{position:relative;z-index:1;display:flex;align-items:center;gap:9px}

@keyframes ripple{to{transform:scale(2.5);opacity:0}}

/* responsive */
@media(max-width:420px){
  .card{padding:30px 20px 28px}
  .vis{width:96px;height:96px}
}
</style>

<script>
// === STARS ===
const bgC = document.getElementById('bg');
const bgX = bgC.getContext('2d');
let stars = [], shoots = [];

function resize() {
  bgC.width = netC.width = window.innerWidth;
  bgC.height = netC.height = window.innerHeight;
  stars = [];
  const n = Math.floor(window.innerWidth * window.innerHeight / 2800);
  const colors = ['167,139,250','100,200,255','255,255,255','244,114,182'];
  for (let i = 0; i < n; i++) {
    stars.push({
      x: Math.random() * bgC.width,
      y: Math.random() * bgC.height,
      r: Math.random() * 1.4 + 0.15,
      a: Math.random(),
      spd: (Math.random() * 0.008 + 0.003) * (Math.random() < .5 ? 1 : -1),
      c: colors[Math.floor(Math.random() * colors.length)]
    });
  }
  createParticles();
}

function drawBg() {
  bgX.clearRect(0, 0, bgC.width, bgC.height);
  stars.forEach(s => {
    s.a += s.spd;
    if (s.a > 1) { s.a = 1; s.spd *= -1; }
    if (s.a < 0.05) { s.a = 0.05; s.spd *= -1; }
    bgX.beginPath();
    bgX.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    bgX.fillStyle = `rgba(${s.c},${s.a})`;
    bgX.fill();
  });

  // occasional shooting star
  if (Math.random() < 0.004) {
    const ang = Math.PI / 6 + Math.random() * Math.PI / 5;
    shoots.push({
      x: Math.random() * bgC.width * .75,
      y: Math.random() * bgC.height * .35,
      vx: Math.cos(ang) * 9, vy: Math.sin(ang) * 9,
      len: 50 + Math.random() * 70, a: 1, dec: .025
    });
  }
  shoots = shoots.filter(s => s.a > 0);
  shoots.forEach(s => {
    bgX.beginPath();
    bgX.moveTo(s.x, s.y);
    bgX.lineTo(s.x - s.vx * s.len / 9, s.y - s.vy * s.len / 9);
    const g = bgX.createLinearGradient(s.x, s.y, s.x - s.vx * s.len / 9, s.y - s.vy * s.len / 9);
    g.addColorStop(0, `rgba(210,190,255,${s.a})`);
    g.addColorStop(1, 'transparent');
    bgX.strokeStyle = g;
    bgX.lineWidth = 1.8;
    bgX.stroke();
    s.x += s.vx; s.y += s.vy; s.a -= s.dec;
  });
}

// === NETWORK PARTICLES ===
const netC = document.getElementById('net');
const netX = netC.getContext('2d');
let pts = [];

function createParticles() {
  pts = [];
  const n = Math.min(50, Math.floor(window.innerWidth / 22));
  const colors = ['167,139,250','100,200,255','244,114,182'];
  for (let i = 0; i < n; i++) {
    pts.push({
      x: Math.random() * netC.width,
      y: Math.random() * netC.height,
      vx: (Math.random() - .5) * .55,
      vy: (Math.random() - .5) * .55,
      r: Math.random() * 2 + .8,
      c: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

function drawNet() {
  netX.clearRect(0, 0, netC.width, netC.height);
  for (let i = 0; i < pts.length; i++) {
    for (let j = i + 1; j < pts.length; j++) {
      const dx = pts[i].x - pts[j].x;
      const dy = pts[i].y - pts[j].y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 160) {
        netX.beginPath();
        netX.moveTo(pts[i].x, pts[i].y);
        netX.lineTo(pts[j].x, pts[j].y);
        netX.strokeStyle = `rgba(167,139,250,${(1 - d / 160) * 0.13})`;
        netX.lineWidth = .5;
        netX.stroke();
      }
    }
  }
  pts.forEach(p => {
    netX.beginPath();
    netX.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    netX.fillStyle = `rgba(${p.c},0.45)`;
    netX.fill();
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0 || p.x > netC.width) p.vx *= -1;
    if (p.y < 0 || p.y > netC.height) p.vy *= -1;
  });
}

function loop() { drawBg(); drawNet(); requestAnimationFrame(loop); }

window.addEventListener('resize', resize);
resize();
loop();

// === CTA ripple ===
document.getElementById('ctaBtn').addEventListener('click', function(e) {
  const el = document.createElement('span');
  const rect = this.getBoundingClientRect();
  const sz = Math.max(rect.width, rect.height);
  Object.assign(el.style, {
    position:'absolute', width:sz+'px', height:sz+'px',
    borderRadius:'50%', background:'rgba(255,255,255,0.28)',
    transform:'scale(0)', animation:'ripple .65s ease-out forwards',
    left:(e.clientX-rect.left-sz/2)+'px',
    top:(e.clientY-rect.top-sz/2)+'px',
    pointerEvents:'none', zIndex:'2'
  });
  this.appendChild(el);
  setTimeout(() => el.remove(), 650);
});
</script>

<style>
@keyframes ripple {
  to { transform: scale(2.6); opacity: 0; }
}
</style>
</body>
